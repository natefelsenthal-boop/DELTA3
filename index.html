<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CORE</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0A0A0A;
            --accent: #D4AF37; 
            --text-main: #FFFFFF;
            --text-dim: #666666;
            --border: #1A1A1A;
            --card-bg: #0F0F0F;
            --success: rgba(40, 167, 69, 0.3);
            --fail: rgba(220, 53, 69, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0 0 120px 0; overflow-x: hidden; 
        }

        header { padding: 40px 20px 20px 20px; position: relative; }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: 4px; color: var(--accent); margin: 0; }
        .motto { font-size: 10px; color: var(--accent); margin-top: 10px; text-transform: uppercase; letter-spacing: 1.5px; width: 75%; font-weight: bold; }
        
        .days-left { position: absolute; top: 45px; right: 20px; text-align: right; }
        .days-val { font-size: 2.2rem; font-weight: 900; display: block; line-height: 1; }
        .days-lbl { font-size: 8px; text-transform: uppercase; color: var(--text-dim); }

        /* AI CONSOLE */
        .ai-console { background: var(--surface); border: 1px solid var(--accent); margin: 0 20px 20px 20px; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        .ai-header { font-size: 10px; color: var(--accent); font-weight: 900; letter-spacing: 2px; margin-bottom: 15px; }
        .ai-text { font-size: 13px; line-height: 1.6; color: #EEE; font-style: italic; min-height: 40px; }

        /* CALENDAR WITH STRIPES */
        .calendar-wrap { display: flex; gap: 10px; overflow-x: auto; padding: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .calendar-wrap::-webkit-scrollbar { display: none; }
        .date-card { 
            min-width: 65px; height: 85px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; 
        }
        .date-card.selected { border: 2px solid var(--accent); transform: scale(1.05); z-index: 5; }
        .stripe-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0.5; }
        .stripe { flex: 1; width: 100%; }
        .date-content { z-index: 2; display: flex; flex-direction: column; align-items: center; pointer-events: none; }

        /* PROGRESS */
        .progress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 20px 20px; }
        .prog-card { background: var(--surface); padding: 15px; border-radius: 6px; border: 1px solid var(--border); }
        .bar-bg { width: 100%; height: 8px; background: #000; border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid var(--border); }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* WORKOUTS */
        .workout-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin: 0 20px 20px 20px; overflow: hidden; }
        .w-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; }
        .w-day { color: var(--accent); font-size: 1.4rem; font-weight: 900; text-transform: uppercase; }
        .w-split { color: var(--text-dim); font-size: 10px; font-weight: bold; margin-top: 4px; text-transform: uppercase; }
        .lift-row { padding: 15px 20px; border-bottom: 1px solid #111; }
        .ref-txt { font-size: 9px; color: var(--text-dim); margin-bottom: 5px; font-style: italic; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; align-items: center; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #FFF; padding: 5px 0; outline: none; width: 100%; font-family: inherit; }

        /* ITEM CARDS */
        .item-card { background: var(--surface); border: 1px solid var(--border); margin: 0 20px 10px 20px; padding: 20px; display: flex; align-items: center; border-radius: 8px; }
        .check-box { width: 22px; height: 22px; border: 1.5px solid #333; border-radius: 50%; margin-right: 15px; flex-shrink: 0; }
        .check-box.done { background: var(--accent); border-color: var(--accent); box-shadow: inset 0 0 0 3px var(--surface); }

        /* UI */
        .btn-prime { background: var(--accent); color: #000; border: none; padding: 18px; width: calc(100% - 40px); margin: 10px 20px; font-weight: 900; text-transform: uppercase; border-radius: 4px; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 20px 0 40px 0; border-top: 1px solid var(--border); z-index: 100; backdrop-filter: blur(10px); }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .nav-btn.active { color: var(--accent); }
        .page { display: none; }
        .page.active { display: block; }
        .vault { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 0 20px; }
        .vault img { width: 100%; aspect-ratio: 1; object-fit: cover; border: 1px solid var(--border); border-radius: 4px; }
        textarea { width: 100%; height: 120px; background: var(--surface); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 8px; font-family: inherit; outline: none; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">FORGE</div>
    <div id="motto-disp" class="motto">SYSTEM STANDBY</div>
    <div class="days-left"><span class="days-val" id="countdown">0</span><span class="days-lbl">Days Left</span></div>
</header>

<div class="calendar-wrap" id="calendar"></div>

<div class="progress-grid">
    <div class="prog-card"><div style="font-size:8px; font-weight:900; color:var(--text-dim);">INTEGRITY</div><div class="bar-bg"><div id="h-bar" class="bar-fill"></div></div></div>
    <div class="prog-card"><div style="font-size:8px; font-weight:900; color:var(--text-dim);">FUEL</div><div class="bar-bg"><div id="e-bar" class="bar-fill"></div></div></div>
</div>

<div id="page-ai" class="page active">
    <div class="ai-console">
        <div class="ai-header">SYSTEM_OPERATOR_v3</div>
        <div id="ai-text" class="ai-text">History loaded. Awaiting performance analysis.</div>
    </div>
    <button class="btn-prime" onclick="runAI()">RUN SYSTEM CHECK</button>
</div>

<div id="page-lift" class="page">
    <div id="workout-list"></div>
</div>

<div id="page-habits" class="page">
    <div id="habit-list"></div>
</div>

<div id="page-eating" class="page">
    <div id="eating-list"></div>
    <div style="padding: 20px;">
        <label style="font-size: 9px; color: var(--accent); font-weight: 900;">MEAL NOTES</label>
        <textarea id="meal-notes" placeholder="Describe your macros..."></textarea>
        <button class="btn-prime" style="margin: 20px 0; width: 100%;" onclick="analyzeFuel()">ANALYZE FUEL QUALITY</button>
        <button class="btn-prime" style="margin: 0; background: #1A1A1A; color: white;" onclick="triggerCam('meals')">+ ADD MEAL PHOTO</button>
    </div>
    <div id="meal-vault" class="vault"></div>
</div>

<div id="page-vault" class="page">
    <button class="btn-prime" onclick="triggerCam('progress')">+ ADD PROGRESS PHOTO</button>
    <div id="progress-vault" class="vault" style="margin-top: 20px;"></div>
</div>

<div id="page-settings" class="page">
    <div style="padding: 20px;">
        <label style="font-size: 9px; color: var(--accent); font-weight: 900;">MANAGE SYSTEM</label>
        <input type="text" id="motto-in" placeholder="Edit Motto" style="margin-bottom: 20px;">
        <button class="btn-prime" onclick="saveMotto()" style="margin: 0 0 40px 0; width: 100%;">SAVE MOTTO</button>
        <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:none; width:100%; font-weight:bold; font-size:10px;">ERASE ALL DATA</button>
    </div>
</div>

<input type="file" id="cam" accept="image/*" capture="camera" style="display:none">

<nav>
    <button class="nav-btn active" onclick="tab('ai', this)">AI</button>
    <button class="nav-btn" onclick="tab('lift', this)">Lift</button>
    <button class="nav-btn" onclick="tab('habits', this)">Habits</button>
    <button class="nav-btn" onclick="tab('eating', this)">Eating</button>
    <button class="nav-btn" onclick="tab('vault', this)">Vault</button>
    <button class="nav-btn" onclick="tab('settings', this)">Set</button>
</nav>

<script>
    const API_KEY = "KvTw"; 
    let selectedDate = new Date().toDateString();

    let db = JSON.parse(localStorage.getItem('forge_elite_final')) || {
        motto: "MAKE HARD DECISIONS",
        habits: ["Drink 2L Water", "No Social Media", "50 Push Ups", "No Soda"],
        eating: ["No Junk Food", "No Seconds", "No Fried Food"],
        splits: {"Tuesday": "Shoulders + Tris", "Wednesday": "Back + Bis", "Sunday": "Chest + Tris"},
        exercises: {"Shoulders + Tris": ["Overhead Press"], "Back + Bis": ["Lat Pulldowns", "Curls"], "Chest + Tris": ["Bench Press"]},
        dailyData: {}
    };

    function getDay(d) {
        if(!db.dailyData[d]) db.dailyData[d] = { habits: db.habits.map(t=>({t, d:false})), eating: db.eating.map(t=>({t, d:false})), lifts: {}, fuelPct: 0, mealNotes: "", photos: [], meals: [] };
        return db.dailyData[d];
    }

    function save() { localStorage.setItem('forge_elite_final', JSON.stringify(db)); render(); }

    async function callAI(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        const res = await fetch(url, { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    async function runAI() {
        const day = getDay(selectedDate);
        const prompt = `Act as an aggressive drill sergeant. Goal: "${db.motto}". Progress: ${day.habits.filter(h=>h.d).length}/${day.habits.length} habits. Give 1 brutal critique and 1 new motto. Format: Critique | Motto`;
        const result = await callAI(prompt);
        const [c, m] = result.split('|');
        document.getElementById('ai-text').innerText = c.trim();
        db.motto = m.trim(); save();
    }

    async function analyzeFuel() {
        const notes = document.getElementById('meal-notes').value;
        const prompt = `Rate this diet out of 100 for fitness: "${notes}". Respond ONLY with the number.`;
        const score = await callAI(prompt);
        const day = getDay(selectedDate);
        day.fuelPct = parseInt(score.trim()) || 0;
        day.mealNotes = notes; save();
    }

    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        btn.classList.add('active');
    }

    function updateLift(split, ex, field, val) {
        const day = getDay(selectedDate);
        if(!day.lifts[split]) day.lifts[split] = {};
        if(!day.lifts[split][ex]) day.lifts[split][ex] = {w:'', r:''};
        day.lifts[split][ex][field] = val;
        save();
    }

    function triggerCam(target) { window.camTarget = target; document.getElementById('cam').click(); }
    document.getElementById('cam').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = () => {
            const day = getDay(selectedDate);
            if(window.camTarget === 'progress') day.photos.unshift(reader.result);
            else day.meals.unshift(reader.result);
            save();
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function findLastLift(split, ex) {
        const dates = Object.keys(db.dailyData).sort((a,b) => new Date(b) - new Date(a));
        for(let d of dates) {
            if(d === selectedDate) continue;
            const s = db.dailyData[d].lifts[split];
            if(s && s[ex] && s[ex].w) return `${s[ex].w}lbs x ${s[ex].r}`;
        }
        return "Baseline";
    }

    function render() {
        const day = getDay(selectedDate);
        document.getElementById('motto-disp').innerText = db.motto;
        document.getElementById('meal-notes').value = day.mealNotes;
        
        // Progress Bars
        const hPct = (day.habits.filter(h=>h.d).length / day.habits.length) * 100;
        document.getElementById('h-bar').style.width = hPct + '%';
        document.getElementById('e-bar').style.width = day.fuelPct + '%';

        // Calendar
        const cal = document.getElementById('calendar');
        const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
        let html = '';
        const now = new Date();
        for(let i = -7; i < 7; i++) {
            const d = new Date(); d.setDate(now.getDate() + i);
            const dStr = d.toDateString();
            const dD = getDay(dStr);
            
            const hasL = Object.values(dD.lifts).some(s => Object.values(s).some(l => l.w));
            const hC = (dD.habits.filter(h=>h.d).length / dD.habits.length) >= 0.7 ? 'var(--success)' : 'var(--fail)';
            const fC = dD.fuelPct >= 70 ? 'var(--success)' : 'var(--fail)';
            const lC = hasL ? 'var(--success)' : 'var(--fail)';

            html += `
            <div class="date-card ${dStr === selectedDate ? 'selected' : ''}" onclick="selectedDate='${dStr}'; render();">
                <div class="stripe-container">
                    <div class="stripe" style="background:${lC}"></div>
                    <div class="stripe" style="background:${hC}"></div>
                    <div class="stripe" style="background:${fC}"></div>
                </div>
                <div class="date-content">
                    <span style="font-size:8px; font-weight:bold;">${days[d.getDay()]}</span>
                    <span style="font-size:20px; font-weight:900;">${d.getDate()}</span>
                </div>
            </div>`;
        }
        cal.innerHTML = html;

        // Lists
        document.getElementById('habit-list').innerHTML = day.habits.map((h, i) => `
            <div class="item-card" onclick="getDay('${selectedDate}').habits[${i}].d = !getDay('${selectedDate}').habits[${i}].d; save();">
                <div class="check-box ${h.d ? 'done' : ''}"></div><span style="font-size:14px; font-weight:bold;">${h.t}</span>
            </div>`).join('');

        document.getElementById('eating-list').innerHTML = day.eating.map((e, i) => `
            <div class="item-card" onclick="getDay('${selectedDate}').eating[${i}].d = !getDay('${selectedDate}').eating[${i}].d; save();">
                <div class="check-box ${e.d ? 'done' : ''}"></div><span style="font-size:14px; font-weight:bold;">${e.t}</span>
            </div>`).join('');

        // Lifts
        const splits = { "Tuesday": "Shoulders + Tris", "Wednesday": "Back + Bis", "Sunday": "Chest + Tris" };
        document.getElementById('workout-list').innerHTML = Object.keys(splits).map(dN => {
            const sN = splits[dN];
            return `<div class="workout-card"><div class="w-header"><span class="w-day">${dN}</span><span class="w-split">${sN}</span></div>
                ${db.exercises[sN].map(ex => {
                    const s = day.lifts[sN]?.[ex] || {w:'', r:''};
                    return `<div class="lift-row"><div class="ref-txt">Prev: ${findLastLift(sN, ex)}</div>
                        <div class="grid-3"><span style="font-size:12px; font-weight:bold;">${ex}</span>
                        <input type="number" placeholder="Lbs" value="${s.w}" oninput="updateLift('${sN}','${ex}','w',this.value)">
                        <input type="number" placeholder="Reps" value="${s.r}" oninput="updateLift('${sN}','${ex}','r',this.value)"></div></div>`;
                }).join('')}</div>`;
        }).join('');

        document.getElementById('progress-vault').innerHTML = day.photos.map(p => `<img src="${p}">`).join('');
        document.getElementById('meal-vault').innerHTML = day.meals.map(p => `<img src="${p}">`).join('');
        
        const diff = Math.ceil((new Date('2026-05-21') - new Date()) / 86400000);
        document.getElementById('countdown').innerText = diff > 0 ? diff : 0;
    }

    function saveMotto() { db.motto = document.getElementById('motto-in').value || db.motto; save(); }
    render();
</script>
</body>
</html>
