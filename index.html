<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DELTA3</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F0F4FF;
  --surface:#FFFFFF;
  --surface2:#F8FAFF;
  --accent:#2563EB;
  --accent2:#1D4ED8;
  --text:#0F172A;
  --muted:#64748B;
  --border:#E2E8F0;
  --green:#16A34A;
  --red:#DC2626;
  --shadow:0 2px 8px rgba(37,99,235,0.08);
  --radius:12px;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;}

.top-frame{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 1px 12px rgba(37,99,235,0.07);}
.header{padding:48px 22px 10px;display:flex;justify-content:space-between;align-items:flex-start;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:4px;color:var(--accent);line-height:1;}
.motto{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:3px;font-family:'DM Mono',monospace;max-width:240px;line-height:1.6;}
.countdown-block{text-align:right;}
.countdown-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--accent);line-height:1;}
.countdown-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;}

/* MONTH YEAR DISPLAY */
.month-year-display {
    padding: 0 22px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text);
    text-transform: uppercase;
}

.date-strip-wrap{display:flex;gap:6px;overflow-x:auto;padding:10px 22px 8px;scrollbar-width:none;}
.date-strip-wrap::-webkit-scrollbar{display:none;}
.date-pill{min-width:48px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);text-align:center;cursor:pointer;flex-shrink:0;overflow:hidden;position:relative;transition:border-color 0.15s;}
.date-pill.active{border-color:var(--accent);}
.date-pill-inner{padding:6px 4px 5px;position:relative;z-index:2;}
.date-pill .dow{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;display:block;}
.date-pill .dom{font-size:15px;font-weight:700;color:var(--text);display:block;margin-top:1px;}
.date-pill.active .dow,.date-pill.active .dom{color:var(--accent);}
.stripes{position:absolute;inset:0;display:flex;flex-direction:column;z-index:1;}
.s1,.s2,.s3{flex:1;}

.score-row{display:flex;gap:8px;padding:0 22px 10px;}
.score-card{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;}
.score-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:4px;}
.score-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.score-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s;}

.prog-bar{height:2px;background:var(--border);margin:0 22px 8px;}
.prog-fill{height:100%;background:var(--accent);transition:width 0.5s;}

.nav{display:flex;padding:0 14px 10px;gap:4px;}
.nav-btn{flex:1;padding:8px 2px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;font-weight:600;}
.nav-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.nav-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}

.main{flex:1;overflow-y:auto;padding:16px 20px 80px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--border);}

/* Elements from render */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text);}
.add-btn{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:10px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:700;transition:all 0.15s;}
.add-btn:hover{background:var(--accent2);}
.checkin-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
.checkin-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.mood-row{display:flex;gap:6px;margin-bottom:10px;}
.mood-btn{flex:1;padding:8px 2px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--muted);font-size:13px;cursor:pointer;text-align:center;transition:all 0.15s;}
.mood-btn.sel{border-color:var(--accent);background:rgba(37,99,235,0.08);color:var(--accent);}
.ci-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;width:100%;resize:none;height:46px;line-height:1.5;transition:border-color 0.15s;}
.ci-input:focus{outline:none;border-color:var(--accent);}
.habit-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);transition:all 0.15s;}
.habit-card.flash-anim{animation:hflash 0.45s ease;}
@keyframes hflash{0%{background:var(--surface);}40%{background:rgba(22,163,74,0.12);}100%{background:var(--surface);}}
.habit-row{display:flex;align-items:center;padding:13px 15px;gap:12px;cursor:pointer;user-select:none;}
.hcheck{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:13px;font-weight:700;}
.hcheck.done{background:var(--green);border-color:var(--green);color:#fff;}
.hcheck.fail{background:var(--red);border-color:var(--red);color:#fff;}
.habit-name{flex:1;font-size:14px;font-weight:500;}
.streak-badge{display:flex;align-items:center;gap:3px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);flex-shrink:0;background:rgba(37,99,235,0.08);padding:3px 8px;border-radius:20px;}
.hdel{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;opacity:0;transition:all 0.15s;font-size:16px;}
.habit-card:hover .hdel{opacity:1;}
.win-card{background:var(--surface);border:1.5px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--radius);padding:12px 15px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);}
.win-text{flex:1;font-size:13px;line-height:1.5;font-weight:500;}
.win-date{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;flex-shrink:0;margin-top:2px;}
.wdel{background:none;border:none;color:var(--muted);cursor:pointer;opacity:0;font-size:16px;transition:all 0.15s;}
.win-card:hover .wdel{opacity:1;}
.ring-wrap{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
.workout-day{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.wd-hdr{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.15s;border-left:4px solid var(--accent);}
.wd-hdr:hover{background:var(--surface2);}
.wd-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;color:var(--accent);}
.wd-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px;font-family:'DM Mono',monospace;}
.last-hit-tag{font-size:9px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:3px;letter-spacing:0.5px;}
.wd-body{border-top:1px solid var(--border);padding:0 16px;}
.ex-row{display:flex;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);gap:10px;}
.ex-row:last-child{border-bottom:none;}
.ex-info{flex:1;}
.ex-name{font-size:13px;font-weight:600;}
.ex-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.ex-history{font-size:9px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:3px;}
.ex-inputs{display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.ex-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;width:50px;padding:5px 4px;text-align:center;transition:border-color 0.15s;}
.ex-input:focus{outline:none;border-color:var(--accent);}
.unit-btn{font-size:9px;font-weight:700;background:var(--accent);color:#fff;padding:4px 6px;border-radius:6px;cursor:pointer;border:none;font-family:'DM Mono',monospace;}
.exdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;opacity:0;transition:all 0.15s;padding:2px;}
.ex-row:hover .exdel{opacity:1;}
.chevron{color:var(--muted);font-size:12px;transition:transform 0.2s;margin-left:4px;}
.chevron.open{transform:rotate(180deg);}
.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.r-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all 0.15s;position:relative;box-shadow:var(--shadow);}
.r-card.good{border-color:var(--green);background:rgba(22,163,74,0.06);}
.r-card.bad{border-color:var(--red);background:rgba(220,38,38,0.06);}
.r-label{font-size:12px;flex:1;line-height:1.3;font-weight:500;}
.r-status{font-size:15px;flex-shrink:0;}
.rdel{position:absolute;top:4px;right:5px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;opacity:0;transition:all 0.15s;}
.r-card:hover .rdel{opacity:1;}
.notes-area{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 15px;width:100%;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:80px;transition:border-color 0.15s;line-height:1.6;}
.notes-area:focus{outline:none;border-color:var(--accent);}
.wlog-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.w-input{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;padding:10px 14px;flex:1;transition:border-color 0.15s;}
.w-input:focus{outline:none;border-color:var(--accent);}
.w-log-btn{background:var(--accent);border:none;color:#fff;border-radius:var(--radius);padding:11px 18px;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:'DM Sans',sans-serif;transition:all 0.15s;flex-shrink:0;}
.graph-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.wstats{display:flex;gap:8px;margin-top:12px;}
.wstat{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center;}
.wstat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);}
.wstat-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.w-hist-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.photo-slot{aspect-ratio:3/4;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.photo-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:8px;display:none;justify-content:space-between;align-items:flex-end;}
.photo-slot:hover .photo-overlay{display:flex;}
.photo-del{background:var(--red);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.photo-date{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.6);padding:2px 7px;border-radius:4px;font-size:9px;color:#fff;font-family:'DM Mono',monospace;}
.privacy-note{background:rgba(37,99,235,0.06);border:1px solid rgba(37,99,235,0.2);border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.ai-console{background:rgba(37,99,235,0.05);border:1.5px solid rgba(37,99,235,0.2);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.ai-header{font-size:10px;color:var(--accent);font-weight:900;letter-spacing:1.5px;margin-bottom:10px;font-family:'DM Mono',monospace;}
.ai-text{font-size:14px;line-height:1.7;color:var(--text);font-style:italic;}
.ai-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:14px;width:100%;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;transition:all 0.15s;margin-bottom:10px;}
.ai-key-row{display:flex;gap:8px;margin-top:10px;}
.ai-key-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;flex:1;transition:border-color 0.15s;}
.settings-sec{margin-bottom:24px;}
.settings-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px;}
.settings-input{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 13px;width:100%;margin-bottom:8px;}
.save-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:11px 24px;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.goal-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.goal-text{flex:1;font-size:13px;font-weight:500;}
.manage-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:4px 14px;margin-bottom:10px;}
.manage-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.manage-row:last-child{border-bottom:none;}
.del-sm{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:10px;font-weight:700;}
.danger-btn{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:var(--radius);padding:11px;width:100%;font-size:12px;cursor:pointer;text-transform:uppercase;font-weight:600;}

.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.6);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(37,99,235,0.15);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:16px;color:var(--accent);}
.modal-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 13px;width:100%;margin-bottom:9px;}
.modal-row{display:flex;gap:8px;margin-top:4px;}
.modal-btn{flex:1;padding:11px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.modal-btn.confirm{background:var(--accent);border:none;color:#fff;}
.modal-btn.cancel{background:none;border:1.5px solid var(--border);color:var(--muted);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--accent);color:#fff;padding:10px 22px;border-radius:40px;font-size:11px;font-weight:700;z-index:3000;opacity:0;transition:all 0.3s;pointer-events:none;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty-state{text-align:center;padding:36px 16px;color:var(--muted);}
</style>
</head>
<body>

<div class="top-frame">
  <div class="header">
    <div>
      <div class="logo">DELTA3</div>
      <div class="motto" id="mottoDisplay">MAKE HARD DECISIONS / IF IT WAS EASY EVERYONE WOULD DO IT</div>
    </div>
    <div class="countdown-block">
      <div class="countdown-num" id="countdownNum">—</div>
      <div class="countdown-label">Days Left</div>
    </div>
  </div>
  <div class="month-year-display" id="monthYearDisplay">MAY 2026</div>
  <div class="date-strip-wrap" id="dateStrip"></div>
  <div class="score-row">
    <div class="score-card">
      <div class="score-label">Habits</div>
      <div class="score-bar"><div class="score-fill" id="habitBar" style="width:0%"></div></div>
    </div>
    <div class="score-card">
      <div class="score-label">Eating</div>
      <div class="score-bar"><div class="score-fill" id="eatingBar" style="width:0%"></div></div>
    </div>
    <div class="score-card">
      <div class="score-label">Lifts</div>
      <div class="score-bar"><div class="score-fill" id="liftBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('habits')">Habits</button>
    <button class="nav-btn" onclick="showTab('lift')">Lift</button>
    <button class="nav-btn" onclick="showTab('eating')">Eating</button>
    <button class="nav-btn" onclick="showTab('weight')">Weight</button>
    <button class="nav-btn" onclick="showTab('photos')">Photos</button>
    <button class="nav-btn" onclick="showTab('ai')">AI</button>
    <button class="nav-btn" onclick="tab('settings', this)">Settings</button>
  </div>
</div>

<div class="main" id="mainContent"></div>
<input type="file" id="photoInput" accept="image/*">
<div class="toast" id="toast"></div>

<script>
const TODAY = new Date();
const START_DATE = new Date('2025-04-11');
function fmtDate(d){return d.toISOString().slice(0,10);}
function getDays(s,e){let a=[],c=new Date(s);while(c<=e){a.push(new Date(c));c.setDate(c.getDate()+1);}return a;}

const DEFAULT_STATE = {
  motto:'MAKE HARD DECISIONS / IF IT WAS EASY EVERYONE WOULD DO IT',
  goalDate:'2025-05-21',
  apiKey:'',
  goals:['Get to target weight by May 21st','Build consistent lifting habit','No junk food streak'],
  habits:[
    {id:1,name:'Drink 2 full water bottles'},
    {id:2,name:'No Instagram or TikTok'},
    {id:3,name:'50 Push Ups'},
    {id:4,name:'Phone Away Before Bed'},
    {id:5,name:'No Dessert'},
    {id:6,name:'No Cliff Bars / Muffins / Pizza / Chips'},
  ],
  lifts:[
    {id:'tue',day:'Tuesday',focus:'Shoulders + Tris',exercises:[
      {id:1,name:'Barbell Overhead Press',sets:'4',reps:'8'},
      {id:2,name:'Lateral Raises',sets:'3',reps:'10-12'},
      {id:3,name:'Front Raises with Plate',sets:'3',reps:'10-14'},
      {id:4,name:'Rope Tricep Pushdown',sets:'3',reps:'10'},
      {id:5,name:'Tricep Dips',sets:'3',reps:'8-10'},
      {id:6,name:'Ab Wheel Rollouts',sets:'3',reps:'12'},
    ]},
    {id:'wed',day:'Wednesday',focus:'Back + Bis',exercises:[
      {id:1,name:'Pull Ups',sets:'5',reps:'5'},
      {id:2,name:'Block Pulls',sets:'4',reps:'5'},
      {id:3,name:'Barbell Row',sets:'4',reps:'8'},
      {id:4,name:'Incline Seated Dumbbell Curls',sets:'3',reps:'8-10'},
      {id:5,name:'Dumbbell Shrugs',sets:'3',reps:'10'},
      {id:6,name:'Hammer Curls',sets:'3',reps:'8-12'},
    ]},
    {id:'sun',day:'Sunday',focus:'Chest + Tris',exercises:[
      {id:1,name:'Incline Bench Press',sets:'4',reps:'8'},
      {id:2,name:'Dumbbell Fly',sets:'3',reps:'12'},
      {id:3,name:'Dips',sets:'2',reps:'8'},
      {id:4,name:'Tricep Pushdown',sets:'3',reps:'12'},
      {id:5,name:'Skull Crushers',sets:'3',reps:'10'},
      {id:6,name:'Ab Wheel Rollouts',sets:'3',reps:'12'},
    ]},
  ],
  restrictions:[
    {id:1,name:'No Drunk/High Eating'},{id:2,name:'No Chips'},{id:3,name:'No Seconds'},
    {id:4,name:'No Pasta'},{id:5,name:'No Fried Food'},{id:6,name:'No Wings'},
    {id:7,name:'No Dessert'},{id:8,name:'Notes Before Every Meal'},
  ],
  habitLogs:{},liftLogs:{},eatingLogs:{},weightLog:{},checkinLogs:{},
  photos:[],wins:[],liftTimestamps:{},aiText:'',
};

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
function loadState(){try{const s=localStorage.getItem('delta3_engine_vLive');if(s){const p=JSON.parse(s);state=Object.assign({},DEFAULT_STATE,p);}}catch(e){}}
function saveState(){try{localStorage.setItem('delta3_engine_vLive',JSON.stringify(state));}catch(e){}}
loadState();

let currentTab='habits',selectedDate=fmtDate(TODAY),expandedWorkout=null;

function getCountdown(){const g=new Date(state.goalDate);return Math.max(0,Math.ceil((g-new Date())/86400000));}
function getProgress(){const g=new Date(state.goalDate),n=new Date();return Math.min(100,Math.max(0,((n-START_DATE)/(g-START_DATE))*100)).toFixed(1);}
function getHabitPct(ds){if(!state.habits.length)return 0;const logs=state.habitLogs[ds]||{};return Math.round(state.habits.filter(h=>logs[h.id]==='done').length/state.habits.length*100);}
function getEatingPct(ds){if(!state.restrictions.length)return 0;const logs=state.eatingLogs[ds]||{};return Math.round(state.restrictions.filter(r=>(logs[r.id]||'none')==='good').length/state.restrictions.length*100);}
function getLiftDone(ds){const logs=state.liftLogs[ds]||{}; return Object.values(logs).some(day => Object.values(day).some(ex => ex.w && ex.w !== ''));}
function getStreak(habitId){let streak=0,d=new Date(TODAY);for(let i=0;i<366;i++){const ds=fmtDate(d);if((state.habitLogs[ds]||{})[habitId]==='done')streak++;else break;d.setDate(d.getDate()-1);}return streak;}
function getLiftHistory(dayId,exIdx){let history=[];const dates=Object.keys(state.liftLogs).sort((a,b)=>b.localeCompare(a));for(const ds of dates){if(ds===selectedDate)continue;const dayData=state.liftLogs[ds]&&state.liftLogs[ds][dayId];if(dayData&&dayData[exIdx]&&dayData[exIdx].w){const e=dayData[exIdx];history.push(`${e.s||'?'}x${e.r||'?'} @ ${e.w}${e.u||'lb'}`);if(history.length>=3)break;}}return history.length?history.join('  |  '):'No history yet';}
function getTimeSince(dayId){const ts=state.liftTimestamps&&state.liftTimestamps[dayId];if(!ts)return 'NEVER HIT';const diff=new Date()-new Date(ts);const days=Math.floor(diff/86400000);const hrs=Math.floor((diff%86400000)/3600000);if(days===0&&hrs===0)return 'TODAY';if(days===0)return `${hrs}H AGO`;return `${days}D ${hrs}H AGO`;}

function updateTopFrame(){
    document.getElementById('countdownNum').textContent=getCountdown();
    document.getElementById('mottoDisplay').textContent=state.motto;
    document.getElementById('progFill').style.width=getProgress()+'%';
    document.getElementById('habitBar').style.width=getHabitPct(selectedDate)+'%';
    document.getElementById('eatingBar').style.width=getEatingPct(selectedDate)+'%';
    document.getElementById('liftBar').style.width=getLiftDone(selectedDate)?'100%':'0%';
    
    const displayDate = new Date(selectedDate + "T12:00:00");
    const monthHeader = displayDate.toLocaleString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
    document.getElementById('monthYearDisplay').textContent = monthHeader;

    const wrap=document.getElementById('dateStrip');
    const todayStr=fmtDate(TODAY);
    let html = '';
    
    for(let i = -15; i <= 15; i++) {
        let d = new Date();
        d.setDate(TODAY.getDate() + i);
        const ds = fmtDate(d);
        const dow = d.toLocaleString('en-US', {weekday: 'short'}).toUpperCase();
        const isA = ds === selectedDate;
        const isTod = ds === todayStr;
        const isPast = d <= TODAY;

        let s1='transparent', s2='transparent', s3='transparent';
        if(isPast) {
            s1 = getHabitPct(ds) >= 70 ? 'rgba(22,163,74,0.5)' : 'rgba(220,38,38,0.35)';
            s2 = getEatingPct(ds) >= 70 ? 'rgba(22,163,74,0.5)' : 'rgba(220,38,38,0.35)';
            s3 = getLiftDone(ds) ? 'rgba(22,163,74,0.5)' : 'rgba(220,38,38,0.35)';
        }

        html += `<div class="date-pill${isA?' active':''}" onclick="selectDate('${ds}')">
            <div class="stripes">
                <div class="s1" style="background:${s1}"></div>
                <div class="s2" style="background:${s2}"></div>
                <div class="s3" style="background:${s3}"></div>
            </div>
            <div class="date-pill-inner">
                <span class="dow">${isTod ? 'NOW' : dow}</span>
                <span class="dom">${d.getDate()}</span>
            </div>
        </div>`;
    }
    wrap.innerHTML = html;
    setTimeout(() => {
        const activeCard = wrap.querySelector('.date-pill.active');
        if(activeCard) activeCard.scrollIntoView({inline:'center', behavior:'smooth'});
    }, 50);
}

function showTab(tab){
  currentTab=tab;
  const btns = document.querySelectorAll('.nav-btn');
  btns.forEach(b => b.classList.remove('active'));
  const names = ['habits','lift','eating','weight','photos','ai','settings'];
  const idx = names.indexOf(tab);
  if(idx !== -1) btns[idx].classList.add('active');
  render();
}
function selectDate(ds){selectedDate=ds;render();}

function render(){
  updateTopFrame();

  if(currentTab==='habits')mc.innerHTML=renderHabits();
  else if(currentTab==='lift')mc.innerHTML=renderLift();
  else if(currentTab==='eating')mc.innerHTML=renderEating();
  else if(currentTab==='weight')mc.innerHTML=renderWeight();

function drawGraph(){
  const canvas=document.getElementById('wGraph');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const entries=Object.entries(state.weightLog).sort((a,b)=>a[0].localeCompare(b[0]));
  const weights=entries.map(e=>parseFloat(e[1])).filter(v=>!isNaN(v));
  if(weights.length<2)return;
  const W=canvas.offsetWidth,H=160;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
  const pad={t:16,r:16,b:28,l:44};
  const minW=Math.min(...weights)-2,maxW=Math.max(...weights)+2;
  const xS=(W-pad.l-pad.r)/(weights.length-1);
  const yS=(H-pad.t-pad.b)/(maxW-minW);
  const px=i=>pad.l+i*xS,py=v=>H-pad.b-(v-minW)*yS;
  ctx.strokeStyle='rgba(226,232,240,0.8)';ctx.lineWidth=1;
  for(let i=0;i<4;i++){const y=pad.t+((H-pad.t-pad.b)/3)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(37,99,235,0.2)');grad.addColorStop(1,'rgba(37,99,235,0)');
  ctx.beginPath();ctx.moveTo(px(0),py(weights[0]));
  weights.forEach((w,i)=>{if(i>0)ctx.lineTo(px(i),py(w));});
  ctx.lineTo(px(weights.length-1),H-pad.b);ctx.lineTo(px(0),H-pad.b);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#2563EB';ctx.lineWidth=2.5;ctx.lineJoin='round';
  weights.forEach((w,i)=>{i===0?ctx.moveTo(px(i),py(w)):ctx.lineTo(px(i),py(w));});ctx.stroke();
  weights.forEach((w,i)=>{
    ctx.beginPath();ctx.arc(px(i),py(w),4,0,Math.PI*2);
    ctx.fillStyle='#2563EB';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  });
  ctx.fillStyle='#94A3B8';ctx.font=`10px 'DM Mono',monospace`;ctx.textAlign='right';
  [minW+2,maxW-2].forEach(v=>ctx.fillText(Math.round(v),pad.l-5,py(v)+3));
  ctx.textAlign='center';
  const midIdx=Math.floor((entries.length-1)/2);
  [[0,entries[0][0].slice(5)],[midIdx,entries[midIdx][0].slice(5)],[entries.length-1,entries[entries.length-1][0].slice(5)]].forEach(([i,lbl])=>ctx.fillText(lbl,px(i),H-pad.b+13));
}

function renderAI(){

  const key=state.apiKey||'';
  return `<div class="ai-console"><div class="ai-header">DELTA3_OPERATOR</div><div class="ai-text" id="aiText">${aiText}</div></div>
  <button class="ai-btn" id="aiRunBtn" onclick="runAI()">Run Performance Scan</button>
  <div style="background:rgba(37,99,235,0.05);border:1px solid rgba(37,99,235,0.15);border-radius:var(--radius);padding:14px 16px;margin-top:6px;">
    <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px;">Gemini API Key (required)</div>
    <div class="ai-key-row">
      <input class="ai-key-input" id="apiKeyInput" type="password" placeholder="Paste key..." value="${key}"/>
      <button class="add-btn" onclick="saveApiKey()">Save</button>
    </div>
  </div>`;
}

async function runAI(){
  if(!state.apiKey){toast('Save API key first!');return;}
  const btn=document.getElementById('aiRunBtn');
  if(btn){btn.disabled=true;btn.textContent='Scanning...';}
  const logs=state.habitLogs[selectedDate]||{};
  const hDone=state.habits.filter(h=>logs[h.id]==='done').length;
  const prompt=`Coach tone. Today: ${hDone}/${state.habits.length} habits. Motto: ${state.motto}. Critique | New Motto.`;
  try{
    const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.apiKey}`;
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const data=await res.json();
    const text=data.candidates[0].content.parts[0].text;
    const parts = text.split('|');
    state.aiText=parts[0].trim();
    if(parts[1]) state.motto=parts[1].trim();
    saveState();render();
  }catch(err){state.aiText='Scan failed.';render();}
}
function saveApiKey(){const k=document.getElementById('apiKeyInput').value.trim();if(k){state.apiKey=k;saveState();toast('API key saved!');}}

function renderSettings(){
  let h=`<div class="settings-sec">
    <div class="settings-lbl">App Motto</div>
    <input class="settings-input" id="s_motto" value="${state.motto}"/>
    <div class="settings-lbl" style="margin-top:4px;">Goal Date</div>
    <input class="settings-input" id="s_date" type="date" value="${state.goalDate}"/>
    <button class="save-btn" onclick="saveSettings()">Save Changes</button>
  </div>`;
  h+=`<div class="settings-sec"><div class="sec-hdr"><div class="settings-lbl">Goals</div><button class="add-btn" onclick="openModal('addGoal')">+ Add</button></div>`;
  state.goals.forEach((g,i)=>{h+=`<div class="goal-item">🎯<div class="goal-text">${g}</div><button class="gdel" onclick="deleteGoal(${i})">✕</button></div>`;});
  h+=`</div>`;
  h+=`<div class="settings-sec"><div class="settings-lbl">Manage Habits</div><div class="manage-box">`;
  state.habits.forEach(hb=>{h+=`<div class="manage-row"><span>${hb.name}</span><button class="del-sm" onclick="deleteHabit(${hb.id})">Remove</button></div>`;});
  h+=`</div><button class="add-btn" onclick="openModal('addHabit')">+ Add Habit</button></div>`;
  h+=`<div class="settings-sec"><div class="settings-lbl">Workouts</div>`;
  state.lifts.forEach(day=>{
    h+=`<div class="manage-box"><div class="manage-row"><strong>${day.day}</strong><button class="del-sm" onclick="deleteWorkoutDay('${day.id}')">Remove</button></div>`;
    day.exercises.forEach(ex=>{h+=`<div class="manage-row" style="border:none;">${ex.name}<button class="del-sm" onclick="deleteExercise('${day.id}',${ex.id})">Remove</button></div>`;});
    h+=`<button class="add-btn" onclick="openModal('addEx','${day.id}')">+ Add Ex</button></div>`;
  });
  h+=`<button class="add-btn" onclick="openModal('addDay')">+ Add Workout Day</button></div>`;
  h+=`<div class="settings-sec"><button class="danger-btn" onclick="confirmReset()">Reset All Data</button></div>`;
  return h;
}
function saveSettings(){const m=document.getElementById('s_motto').value.trim();const d=document.getElementById('s_date').value;if(m)state.motto=m;if(d)state.goalDate=d;saveState();render();toast('Saved!');}
function deleteGoal(i){state.goals.splice(i,1);saveState();render();}
function confirmReset(){if(confirm('Erase all data?')){localStorage.removeItem('delta3_engine_vLive');location.reload();}}

function openModal(type,extra=''){
  closeModal();
  const templates={
    addHabit:()=>`<div class="modal-title">New Habit</div><input class="modal-input" id="mi_hn" placeholder="Name..." autofocus/><div class="modal-row"><button class="modal-btn cancel" onclick="closeModal()">Cancel</button><button class="modal-btn confirm" onclick="confirmAddHabit()">Add</button></div>`,
    addWin:()=>`<div class="modal-title">Log a Win</div><input class="modal-input" id="mi_win" placeholder="Crushed it..." autofocus/><div class="modal-row"><button class="modal-btn cancel" onclick="closeModal()">Cancel</button><button class="modal-btn confirm" onclick="confirmAddWin()">Log It</button></div>`,
    addEx:()=>`<div class="modal-title">Add Exercise</div><input class="modal-input" id="mi_en" placeholder="Name..." autofocus/><div style="display:flex;gap:8px;"><input class="modal-input" id="mi_es" placeholder="Sets"/><input class="modal-input" id="mi_er" placeholder="Reps"/></div><div class="modal-row"><button class="modal-btn cancel" onclick="closeModal()">Cancel</button><button class="modal-btn confirm" onclick="confirmAddExercise('${extra}')">Add</button></div>`,
    addDay:()=>`<div class="modal-title">Add Workout Day</div><input class="modal-input" id="mi_wd" placeholder="e.g. Monday" autofocus/><input class="modal-input" id="mi_wf" placeholder="Focus..."/><div class="modal-row"><button class="modal-btn cancel" onclick="closeModal()">Cancel</button><button class="modal-btn confirm" onclick="confirmAddDay()">Add</button></div>`,
    addRule:()=>`<div class="modal-title">Add Rule</div><input class="modal-input" id="mi_rn" placeholder="Rule..." autofocus/><div class="modal-row"><button class="modal-btn cancel" onclick="closeModal()">Cancel</button><button class="modal-btn confirm" onclick="confirmAddRule()">Add</button></div>`,
    addGoal:()=>`<div class="modal-title">New Goal</div><input class="modal-input" id="mi_goal" placeholder="Working toward..." autofocus/><div class="modal-row"><button class="modal-btn cancel" onclick="closeModal()">Cancel</button><button class="modal-btn confirm" onclick="confirmAddGoal()">Add</button></div>`
  };
  const content=templates[type] ? templates[type]() : '';
  if(!content)return;
  const o=document.createElement('div');o.className='modal-overlay';o.id='mo';
  o.innerHTML=`<div class="modal">${content}</div>`;
  o.addEventListener('click',e=>{if(e.target===o)closeModal();});
  document.body.appendChild(o);
}
function closeModal(){const e=document.getElementById('mo');if(e)e.remove();}
function confirmAddHabit(){const n=document.getElementById('mi_hn').value.trim();if(!n)return;state.habits.push({id:Date.now(),name:n});saveState();closeModal();render();}
function confirmAddWin(){const t=document.getElementById('mi_win').value.trim();if(!t)return;state.wins.push({text:t,date:fmtDate(TODAY)});saveState();closeModal();render();}
function confirmAddExercise(dayId){const n=document.getElementById('mi_en').value.trim();if(!n)return;const d=state.lifts.find(x=>x.id===dayId);if(d)d.exercises.push({id:Date.now(),name:n,sets:document.getElementById('mi_es').value.trim()||'3',reps:document.getElementById('mi_er').value.trim()||'10'});saveState();closeModal();render();}
function confirmAddDay(){const day=document.getElementById('mi_wd').value.trim();if(!day)return;state.lifts.push({id:'d_'+Date.now(),day,focus:document.getElementById('mi_wf').value.trim()||'',exercises:[]});saveState();closeModal();render();}
function confirmAddRule(){const n=document.getElementById('mi_rn').value.trim();if(!n)return;state.restrictions.push({id:Date.now(),name:n});saveState();closeModal();render();}
function confirmAddGoal(){const g=document.getElementById('mi_goal').value.trim();if(!g)return;state.goals.push(g);saveState();closeModal();render();}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function attachEvents(){
  const pi=document.getElementById('photoInput');
  if(pi)pi.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();r.onload=ev=>{state.photos.unshift({data:ev.target.result,date:fmtDate(TODAY)});saveState();render();};r.readAsDataURL(file);
  };
  const na=document.getElementById('notesArea');
  if(na)na.addEventListener('input',function(){if(!state.eatingLogs[selectedDate])state.eatingLogs[selectedDate]={notes:''};state.eatingLogs[selectedDate].notes=this.value;saveState();});
  const ci=document.getElementById('ciNote');
  if(ci)ci.addEventListener('input',function(){if(!state.checkinLogs[selectedDate])state.checkinLogs[selectedDate]={mood:0,note:''};state.checkinLogs[selectedDate].note=this.value;saveState();});
}

function tab(t, b) { 
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active')); 
  b.classList.add('active'); 
  showTab(t);
}

render();
</script>
</body>
</html>
